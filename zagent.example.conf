# Example configuration for zagent.
# Copy this file to one of the following locations:
#   $XDG_CONFIG_HOME/zagent
#   ~/.config/zagent
#
# Environment variables override values from this file.

# Required for remote OpenAI-compatible endpoints.
AI_KEY=sk-your-api-key-here

# Optional. Defaults to https://api.openai.com/v1
AI_URL=https://api.openai.com/v1

# Optional. Defaults to gpt-4o-mini
AI_MODEL=gpt-4o-mini

# Optional. Defaults to 4096
AI_MAX_TOKENS=4096
